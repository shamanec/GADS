{{define "configuration-grid"}}
<div>
<form id="config-form">
    <link href="/static/css/change_config_styles.css" rel="stylesheet">
    <ul class="wrapper">
        <li class="form-row">
            <label >Devices Host</label>
            <input autocomplete="off" name="devices_host" type="text" id="devices_host" value="{{.AppiumConfiguration.DevicesHost}}">
        </li>
        <li class="form-row">
            <label for="selenium_hub_host">Selenium Hub Host</label>
            <input autocomplete="off" name="selenium_hub_host" type="text" id="selenium_hub_host" value="{{.AppiumConfiguration.SeleniumHubHost}}">
        </li>
        <li class="form-row">
            <label for="selenium_hub_port">Selenium Hub Port</label>
            <input autocomplete="off" name="selenium_hub_port" type="text" id="selenium_hub_port" value="{{.AppiumConfiguration.SeleniumHubPort}}">
        </li>
        <li class="form-row">
            <label for="selenium_hub_protocol_type">Selenium Hub Protocol Type</label>
            <input autocomplete="off" name="selenium_hub_protocol_type" type="text" id="selenium_hub_protocol_type" value="{{.AppiumConfiguration.SeleniumHubProtocolType}}">
        </li>
        <li class="form-row">
            <label for="wda_bundle_id">WDA Bundle ID</label>
            <input autocomplete="off" name="wda_bundle_id" type="text" id="wda_bundle_id" value="{{.AppiumConfiguration.WDABundleID}}">
        </li>
        <li class="form-row">
            <button id="config-submit" type="submit">Update configuration</button>
        </li>
    </ul>
</form>
</div>
{{end}}
